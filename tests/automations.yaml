# Exercises the automation surface:
#   - multiple automations attached to a single trigger
#   - a non-lambda action (logger.log) with trigger variables as args
#   - the 0x0000/0x0000 "match any device" wildcard
#   - a realistic keycode/usage dispatch switch
#
# Template buttons stand in for whatever the automations would really drive.
esphome:
  name: usbhid-automations

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [usb_hid_keyboard]

usb_host:

usb_hid_keyboard:
  id: mx3
  vid: 0x0000
  pid: 0x0000
  on_key:
    - lambda: |-
        switch (keycode) {
          case 0x52: id(tv_up).press();     break;
          case 0x51: id(tv_down).press();   break;
          case 0x50: id(tv_left).press();   break;
          case 0x4F: id(tv_right).press();  break;
          case 0x28: id(tv_select).press(); break;
          case 0x29: id(tv_back).press();   break;
          case 0x4A: id(tv_home).press();   break;
          default:
            ESP_LOGW("mx3", "UNMAPPED key 0x%02X mod 0x%02X", keycode, modifier);
        }
    - logger.log:
        format: "second on_key automation, keycode=0x%02X"
        args: [keycode]
        level: DEBUG
  on_consumer:
    - lambda: |-
        switch (usage) {
          case 0xE9:  id(tv_volume_up).press();   break;
          case 0xEA:  id(tv_volume_down).press(); break;
          case 0xE2:  id(tv_mute).press();        break;
          case 0xCD:  id(tv_play_pause).press();  break;
          case 0x223: id(tv_home).press();        break;
          default:
            ESP_LOGW("mx3", "UNMAPPED consumer 0x%04X", usage);
        }

button:
  - platform: template
    id: tv_up
    name: "TV Up"
  - platform: template
    id: tv_down
    name: "TV Down"
  - platform: template
    id: tv_left
    name: "TV Left"
  - platform: template
    id: tv_right
    name: "TV Right"
  - platform: template
    id: tv_select
    name: "TV Select"
  - platform: template
    id: tv_back
    name: "TV Back"
  - platform: template
    id: tv_home
    name: "TV Home"
  - platform: template
    id: tv_volume_up
    name: "TV Volume Up"
  - platform: template
    id: tv_volume_down
    name: "TV Volume Down"
  - platform: template
    id: tv_mute
    name: "TV Mute"
  - platform: template
    id: tv_play_pause
    name: "TV Play/Pause"
